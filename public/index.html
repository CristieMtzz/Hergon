    .ai-panel{position:fixed;right:0;bottom:0;width:380px;height:500px;background:#fff;box-shadow:-4px -4px 20px rgba(0,0,0,.15);z-index:160;border-radius:16px 0 0 0;display:flex;flex-direction:column;transform:translateY(100%);transition:.3s}

    .ai-fab{position:fixed;bottom:20px;right:20px;width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,#1e3a5f,#2563eb);color:#fff;border:none;cursor:pointer;font-size:22px;box-shadow:0 4px 15px rgba(30,58,95,.4);z-index:155;display:flex;align-items:center;justify-content:center;transition:.2s}
    .ai-fab:hover{transform:scale(1.1);box-shadow:0 6px 20px rgba(30,58,95,.5)}

<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback}=React;
const API=window.location.origin+'/api';
const socket=io(window.location.origin,{reconnection:true,reconnectionDelay:2000,reconnectionAttempts:Infinity});

// === PWA: Service Worker Registration ===
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('/service-worker.js').then(reg=>{
    console.log('[PWA] Service Worker registrado');
    reg.addEventListener('updatefound',()=>{
      const nw=reg.installing;
      nw.addEventListener('statechange',()=>{if(nw.state==='installed'&&navigator.serviceWorker.controller){console.log('[PWA] Nueva version disponible');nw.postMessage({type:'SKIP_WAITING'})}});
    });
  }).catch(e=>console.warn('[PWA] SW error:',e));
  navigator.serviceWorker.addEventListener('message',e=>{if(e.data&&e.data.type==='SYNC_VENTAS')HergonOffline.syncQueue()});
}

// === IndexedDB: Cola Offline ===
const HergonOffline={
  DB_NAME:'hergon_offline',DB_VER:1,
  _db:null,
  open(){
    return new Promise((res,rej)=>{
      if(this._db)return res(this._db);
      const rq=indexedDB.open(this.DB_NAME,this.DB_VER);
      rq.onupgradeneeded=e=>{
        const db=e.target.result;
        if(!db.objectStoreNames.contains('ventas_queue'))db.createObjectStore('ventas_queue',{keyPath:'offline_id',autoIncrement:true});
        if(!db.objectStoreNames.contains('productos_cache'))db.createObjectStore('productos_cache',{keyPath:'id'});
        if(!db.objectStoreNames.contains('categorias_cache'))db.createObjectStore('categorias_cache',{keyPath:'id'});
        if(!db.objectStoreNames.contains('clientes_cache'))db.createObjectStore('clientes_cache',{keyPath:'id'});
        if(!db.objectStoreNames.contains('meta'))db.createObjectStore('meta',{keyPath:'key'});
      };
      rq.onsuccess=e=>{this._db=e.target.result;res(this._db)};
      rq.onerror=e=>rej(e.target.error);
    });
  },
  async addVenta(venta){
    const db=await this.open();
    const tx=db.transaction('ventas_queue','readwrite');
    venta.timestamp_offline=new Date().toISOString();
    tx.objectStore('ventas_queue').add(venta);
    return new Promise((res,rej)=>{tx.oncomplete=()=>res(true);tx.onerror=e=>rej(e)});
  },
  async getQueue(){
    const db=await this.open();
    return new Promise((res,rej)=>{
      const tx=db.transaction('ventas_queue','readonly');
      const rq=tx.objectStore('ventas_queue').getAll();
      rq.onsuccess=()=>res(rq.result);rq.onerror=e=>rej(e);
    });
  },
  async clearQueue(ids){
    const db=await this.open();
    const tx=db.transaction('ventas_queue','readwrite');
    const store=tx.objectStore('ventas_queue');
    ids.forEach(id=>store.delete(id));
    return new Promise((res,rej)=>{tx.oncomplete=()=>res(true);tx.onerror=e=>rej(e)});
  },
  async getQueueCount(){
    const db=await this.open();
    return new Promise((res,rej)=>{
      const tx=db.transaction('ventas_queue','readonly');
      const rq=tx.objectStore('ventas_queue').count();
      rq.onsuccess=()=>res(rq.result);rq.onerror=()=>res(0);
    });
  },
  async cacheData(storeName,data){
    const db=await this.open();
    const tx=db.transaction(storeName,'readwrite');
    const store=tx.objectStore(storeName);
    store.clear();
    data.forEach(item=>store.put(item));
    return new Promise((res,rej)=>{tx.oncomplete=()=>res(true);tx.onerror=e=>rej(e)});
  },
  async getCachedData(storeName){
    const db=await this.open();
    return new Promise((res,rej)=>{
      const tx=db.transaction(storeName,'readonly');
      const rq=tx.objectStore(storeName).getAll();
      rq.onsuccess=()=>res(rq.result);rq.onerror=()=>res([]);
    });
  },
  async refreshCache(sucursalId){
    try{
      const data=await api(`/cache/productos?sucursal_id=${sucursalId||''}`);
      if(data.productos)await this.cacheData('productos_cache',data.productos);
      if(data.categorias)await this.cacheData('categorias_cache',data.categorias);
      if(data.clientes)await this.cacheData('clientes_cache',data.clientes);
      const db=await this.open();
      const tx=db.transaction('meta','readwrite');
      tx.objectStore('meta').put({key:'last_cache',value:new Date().toISOString()});
      console.log('[Offline] Cache actualizado:',data.productos?.length,'productos');
      return true;
    }catch(e){console.warn('[Offline] No se pudo actualizar cache:',e);return false}
  },
  async syncQueue(){
    const queue=await this.getQueue();
    if(queue.length===0)return{ok:true,count:0};
    try{
      const tk=localStorage.getItem('token');
      const resp=await fetch(API+'/sync/ventas',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+tk},body:JSON.stringify({ventas_offline:queue})});
      const data=await resp.json();
      if(data.resultados){
        const okIds=data.resultados.filter(r=>r.status==='ok').map(r=>r.offline_id);
        if(okIds.length>0)await this.clearQueue(okIds);
      }
      return{ok:true,count:data.sincronizadas||0,errors:data.errores||0};
    }catch(e){console.warn('[Sync] Error:',e);return{ok:false,error:e.message}}
  }
};
// Init IndexedDB early
HergonOffline.open();

// === API Helper ===
async function api(path,opts={}){
  const tk=localStorage.getItem('token');
  const h={'Content-Type':'application/json'};
  if(tk)h['Authorization']='Bearer '+tk;
  const r=await fetch(API+path,{...opts,headers:{...h,...(opts.headers||{})}});
  const d=await r.json();
  if(!r.ok)throw new Error(d.error||'Error');
  return d;
}

// === LOGIN ===
function Login({onLogin}){
  const[u,setU]=useState('');const[p,setP]=useState('');const[err,setErr]=useState('');
  const submit=async e=>{e.preventDefault();setErr('');
    try{const d=await api('/auth/login',{method:'POST',body:JSON.stringify({usuario:u,password:p})});
      localStorage.setItem('token',d.token);localStorage.setItem('user',JSON.stringify(d.user));onLogin(d.user);
    }catch(e){setErr(e.message)}};
  return(<div className="login-pg"><div className="login-c">
    <h1><i className="fas fa-tools" style={{color:'#1a56db'}}/> HERGON</h1>
    <p className="sub">Sistema de Gestión - Punto de Venta</p>
    {err&&<div className="login-err">{err}</div>}
    <form onSubmit={submit}>
      <div className="fg"><label>Usuario</label><input value={u} onChange={e=>setU(e.target.value)} placeholder="admin" autoFocus/></div>
      <div className="fg"><label>Contraseña</label><input type="password" value={p} onChange={e=>setP(e.target.value)} placeholder="admin123"/></div>
      <button className="btn btn-p btn-lg" style={{width:'100%',marginTop:8}}>Iniciar Sesión</button>
    </form>
    <div style={{marginTop:16,fontSize:11,color:'#94a3b8',textAlign:'center'}}>
      <b>Admin:</b> admin / admin123 &nbsp;|&nbsp; <b>Cajero:</b> maria / cajero123
    </div>
  </div></div>);
}

// === SIDEBAR ===
function Sidebar({page,setPage,user,onLogout}){
  const isAdmin=user.rol==='administrador';
  const items=[
    {id:'dashboard',icon:'fa-chart-pie',label:'Dashboard'},
    {id:'pos',icon:'fa-cash-register',label:'Punto de Venta'},
    {id:'inventario',icon:'fa-boxes-stacked',label:'Inventario'},
    {id:'cortes',icon:'fa-receipt',label:'Cortes de Caja'},
    {id:'div1'},
    ...(isAdmin?[{id:'clientes',icon:'fa-users',label:'Clientes'},{id:'promociones',icon:'fa-tags',label:'Promociones'},{id:'usuarios',icon:'fa-user-gear',label:'Usuarios'},{id:'reportes',icon:'fa-chart-bar',label:'Reportes'}]:[{id:'clientes',icon:'fa-users',label:'Clientes'}]),
  ];
  return(<div className="sidebar">
    <div className="sidebar-logo"><h2><i className="fas fa-tools"/> HERGON POS</h2><small>Tornillos y Hules Automotrices</small></div>
    <div className="sidebar-nav">
      {items.map((it,i)=>it.id.startsWith('div')?<div key={i} className="nav-div"/>:
        <div key={it.id} className={`nav-item ${page===it.id?'active':''}`} onClick={()=>setPage(it.id)}>
          <i className={`fas ${it.icon}`}/>{it.label}
        </div>)}
    </div>
    <div className="sb-footer">
      <div className="uname">{user.nombre}</div>
      <div>{user.sucursal_nombre} · {user.rol==='administrador'?'Admin':'Cajero'}</div>
      <button className="btn btn-o btn-sm" style={{marginTop:8,width:'100%'}} onClick={onLogout}><i className="fas fa-sign-out-alt"/> Cerrar sesión</button>
    </div>
  </div>);
}

// === DASHBOARD ===
function Dashboard(){
  const[d,setD]=useState(null);
  useEffect(()=>{api('/dashboard').then(setD).catch(console.error)},[]);
  if(!d)return <div className="content"><p>Cargando...</p></div>;
  return(<div className="content">
    <div className="stats-grid">
      <div className="stat-card"><i className="fas fa-shopping-cart si"/><div className="sv">{d.ventas_hoy.num}</div><div className="sl">Ventas hoy</div></div>
      <div className="stat-card"><i className="fas fa-dollar-sign si"/><div className="sv">${Number(d.ventas_hoy.monto).toFixed(2)}</div><div className="sl">Monto total hoy</div></div>
      <div className="stat-card"><i className="fas fa-exclamation-triangle si" style={{color:'#fbbf24'}}/><div className="sv" style={{color:'var(--warn)'}}>{d.alertas_stock}</div><div className="sl">Alertas de stock</div></div>
      <div className="stat-card"><i className="fas fa-box si"/><div className="sv">{d.total_productos}</div><div className="sl">Productos activos</div></div>
    </div>
    <div className="card"><div className="card-hdr"><span className="card-title">Ventas por Sucursal (Hoy)</span></div>
      <table><thead><tr><th>Sucursal</th><th>Ventas</th><th>Monto</th></tr></thead>
        <tbody>{d.ventas_por_sucursal.map((s,i)=><tr key={i}><td>{s.nombre}</td><td>{s.ventas}</td><td>${Number(s.monto).toFixed(2)}</td></tr>)}</tbody>

// === POS ===
function POS({user}){
  const[prods,setProds]=useState([]);const[q,setQ]=useState('');const[cat,setCat]=useState('');
  const[cats,setCats]=useState([]);const[cart,setCart]=useState([]);const[cliente,setCliente]=useState(null);
  const[clientes,setClientes]=useState([]);const[tipoPago,setTipoPago]=useState('efectivo');
  const[showTicket,setShowTicket]=useState(null);const[showPin,setShowPin]=useState(false);
  const[pin,setPin]=useState('');const[pinErr,setPinErr]=useState('');const[searchCli,setSearchCli]=useState('');
  const[showCli,setShowCli]=useState(false);

  useEffect(()=>{api('/categorias').then(setCats).catch(async()=>{const c=await HergonOffline.getCachedData('categorias_cache');setCats(c)})},[]);
  useEffect(()=>{const t=setTimeout(()=>{
    if(navigator.onLine){api(`/productos?q=${q}&categoria_id=${cat}&sucursal_id=${user.sucursal_id}`).then(setProds).catch(async()=>{
      const cached=await HergonOffline.getCachedData('productos_cache');
      const filtered=cached.filter(p=>{if(q&&!p.clave.toLowerCase().includes(q.toLowerCase())&&!p.nombre.toLowerCase().includes(q.toLowerCase()))return false;if(cat&&p.categoria_id!=cat)return false;return true});
      setProds(filtered.slice(0,200));
    })}else{
      HergonOffline.getCachedData('productos_cache').then(cached=>{
        const filtered=cached.filter(p=>{if(q&&!p.clave.toLowerCase().includes(q.toLowerCase())&&!p.nombre.toLowerCase().includes(q.toLowerCase()))return false;if(cat&&p.categoria_id!=cat)return false;return true});
        setProds(filtered.slice(0,200));
      });
    }
  },300);return()=>clearTimeout(t)},[q,cat]);

  const addToCart=(prod)=>{
    setCart(c=>{const ex=c.find(i=>i.producto_id===prod.id);
      if(ex)return c.map(i=>i.producto_id===prod.id?{...i,cantidad:i.cantidad+1}:i);
      return[...c,{producto_id:prod.id,clave:prod.clave,nombre:prod.nombre,cantidad:1,precio:prod.precio_menudeo,stock:prod.stock_local,
        p_men:prod.precio_menudeo,p_mmed:prod.precio_medio_mayoreo,p_may:prod.precio_mayoreo,c_mmed:prod.cantidad_medio_mayoreo,c_may:prod.cantidad_mayoreo}];
    });
  };
  const updQty=(pid,delta)=>{setCart(c=>c.map(i=>{
    if(i.producto_id!==pid)return i;
    const nq=Math.max(0,i.cantidad+delta);
    let pr=i.p_men;if(nq>=i.c_may)pr=i.p_may;else if(nq>=i.c_mmed)pr=i.p_mmed;
    return nq===0?null:{...i,cantidad:nq,precio:pr};
  }).filter(Boolean))};
  const removeItem=pid=>setCart(c=>c.filter(i=>i.producto_id!==pid));
  const subtotal=cart.reduce((s,i)=>s+i.precio*i.cantidad,0);

  const completeSale=async(adminId)=>{
    try{
      const body={items:cart.map(i=>({producto_id:i.producto_id,cantidad:i.cantidad})),tipo_pago:tipoPago,cliente_id:cliente?.id||null};
      if(adminId)body.autorizado_por=adminId;
      if(!navigator.onLine){
        // OFFLINE: save to IndexedDB queue
        await HergonOffline.addVenta({...body,offline_id:Date.now()});
        // Update local cache stock
        const cached=await HergonOffline.getCachedData('productos_cache');
        for(const item of body.items){const p=cached.find(x=>x.id===item.producto_id);if(p)p.stock_local=Math.max(0,(p.stock_local||0)-item.cantidad)}
        await HergonOffline.cacheData('productos_cache',cached);
        const offlineTicket={ticket_numero:'OFFLINE-'+Date.now(),total:subtotal,tipo_pago:tipoPago,sucursal_nombre:user.sucursal_nombre,
          cajero_nombre:user.nombre,created_at:new Date().toISOString(),detalles:cart.map(i=>({clave:i.clave,cantidad:i.cantidad,precio_unitario:i.precio,subtotal:i.precio*i.cantidad})),
          descuento_promocion:0,descuento_membresia:0,cliente_nombre:cliente?.nombre||null,offline:true};
        setShowTicket(offlineTicket);setCart([]);setCliente(null);setTipoPago('efectivo');
        // Refresh products from cache
        const updatedProds=await HergonOffline.getCachedData('productos_cache');
        setProds(updatedProds.filter(p=>{
          if(q&&!p.clave.toLowerCase().includes(q.toLowerCase())&&!p.nombre.toLowerCase().includes(q.toLowerCase()))return false;
          if(cat&&p.categoria_id!=cat)return false;return true;
        }).slice(0,200));
        return;
      }
      const venta=await api('/ventas',{method:'POST',body:JSON.stringify(body)});
      setShowTicket(venta);setCart([]);setCliente(null);setTipoPago('efectivo');
      // refresh products
      api(`/productos?q=${q}&categoria_id=${cat}&sucursal_id=${user.sucursal_id}`).then(setProds);
    }catch(e){
      // Network error fallback: try offline
      if(e.message==='Failed to fetch'||e.message.includes('NetworkError')){
        const body={items:cart.map(i=>({producto_id:i.producto_id,cantidad:i.cantidad})),tipo_pago:tipoPago,cliente_id:cliente?.id||null};
        await HergonOffline.addVenta({...body,offline_id:Date.now()});
        alert('Venta guardada offline. Se sincronizara al recuperar la conexion.');
        setCart([]);setCliente(null);setTipoPago('efectivo');
      }else{alert('Error: '+e.message)}
    }
  };

  const handlePay=()=>{
    if(cart.length===0)return alert('Agrega productos al carrito');
    if(tipoPago==='tarjeta'&&user.rol!=='administrador'){setShowPin(true);setPin('');setPinErr('');return}
    completeSale();
  };
  const verifyPin=async()=>{
    try{const r=await api('/auth/verify-pin',{method:'POST',body:JSON.stringify({pin})});setShowPin(false);completeSale(r.admin_id)}
    catch(e){setPinErr(e.message)}
  };
  const searchClientes=async()=>{try{const c=await api(`/clientes?q=${searchCli}`);setClientes(c)}catch(e){}};

  return(<div className="content no-print">
    <div className="pos-lay">
      <div className="pos-prods">
        <div className="sbar">
          <input placeholder="Buscar por clave o nombre..." value={q} onChange={e=>setQ(e.target.value)}/>
          <select style={{width:180}} value={cat} onChange={e=>setCat(e.target.value)}>
            <option value="">Todas las categorías</option>
            {cats.map(c=><option key={c.id} value={c.id}>{c.nombre}</option>)}
          </select>
        </div>
        <div className="pgrid">
          {prods.map(p=><div key={p.id} className="pcard" onClick={()=>p.stock_local>0&&addToCart(p)}>
            <div className="ck">{p.clave}</div><div className="nm">{p.nombre}</div>
            <div className="pr">${p.precio_menudeo.toFixed(2)}</div>
            <div className="stk" style={{color:p.stock_local<=0?'var(--err)':p.stock_local<=p.stock_minimo?'var(--warn)':'var(--txtl)'}}>
              Stock: {p.stock_local} {p.stock_local<=0&&'· SIN STOCK'}
            </div>
          </div>)}
          {prods.length===0&&<div className="empty" style={{gridColumn:'1/-1'}}><i className="fas fa-search"/><p>Busca productos para agregar</p></div>}
        </div>
      </div>
      <div className="pos-cart card" style={{display:'flex',flexDirection:'column'}}>
        <div className="card-hdr"><span className="card-title"><i className="fas fa-shopping-cart"/> Carrito</span>
          <span className="pill pill-b">{cart.length} items</span>
        </div>
        {/* Cliente */}
        <div style={{marginBottom:10,fontSize:12}}>
          <div style={{display:'flex',gap:4,marginBottom:4}}>
            <button className="btn btn-o btn-sm" onClick={()=>{setShowCli(true);searchClientes()}}><i className="fas fa-user-plus"/> {cliente?cliente.nombre:'Asignar cliente'}</button>
            {cliente&&<button className="btn btn-sm btn-err" onClick={()=>setCliente(null)}>×</button>}
          </div>
        </div>
        <div className="cart-items">
          {cart.map(i=><div key={i.producto_id} className="cart-item">
            <div style={{flex:1}}><div style={{fontWeight:600,fontSize:12}}>{i.clave}</div><div style={{fontSize:11,color:'var(--txtl)'}}>{i.nombre}</div>
              <div style={{fontSize:11,color:'var(--ok)'}}>${i.precio.toFixed(2)} c/u</div>
            </div>
            <div className="qc">
              <button onClick={()=>updQty(i.producto_id,-1)}>-</button><span>{i.cantidad}</span><button onClick={()=>i.cantidad<i.stock&&updQty(i.producto_id,1)}>+</button>
              <button onClick={()=>removeItem(i.producto_id)} style={{color:'var(--err)',border:'none',background:'none',cursor:'pointer'}}><i className="fas fa-trash"/></button>
            </div>
            <div style={{minWidth:65,textAlign:'right',fontWeight:700,fontSize:13}}>${(i.precio*i.cantidad).toFixed(2)}</div>
          </div>)}
          {cart.length===0&&<div className="empty"><i className="fas fa-cart-plus"/><p>Carrito vacío</p></div>}
        </div>
        <div className="cart-total">
          <div style={{display:'flex',justifyContent:'space-between',fontSize:18,fontWeight:800}}>
            <span>TOTAL:</span><span>${subtotal.toFixed(2)}</span>
          </div>
          <div className="fg" style={{marginTop:10}}>
            <label>Tipo de pago</label>
            <select value={tipoPago} onChange={e=>setTipoPago(e.target.value)}>
              <option value="efectivo">💵 Efectivo</option>
              <option value="transferencia">📱 Transferencia</option>
              <option value="tarjeta">💳 Tarjeta</option>
            </select>
          </div>
          <button className="btn btn-ok btn-lg" style={{width:'100%',marginTop:6}} onClick={handlePay}>
            <i className="fas fa-check-circle"/> Cobrar ${subtotal.toFixed(2)}
          </button>
        </div>
      </div>
    </div>

    {/* PIN Modal */}
    {showPin&&<div className="modal-ov"><div className="modal" style={{maxWidth:340}}>
      <h3><i className="fas fa-lock"/> Autorización requerida</h3>
      <p style={{fontSize:13,marginBottom:12}}>El pago con tarjeta requiere PIN de administrador.</p>
      {pinErr&&<div className="login-err">{pinErr}</div>}
      <input type="password" placeholder="PIN de administrador" value={pin} onChange={e=>setPin(e.target.value)} autoFocus onKeyDown={e=>e.key==='Enter'&&verifyPin()}/>
      <div style={{display:'flex',gap:8,marginTop:12}}>
        <button className="btn btn-ok" onClick={verifyPin}>Autorizar</button>
        <button className="btn btn-o" onClick={()=>setShowPin(false)}>Cancelar</button>
      </div>
    </div></div>}

    {/* Cliente Modal */}
    {showCli&&<div className="modal-ov"><div className="modal">
      <h3>Seleccionar Cliente</h3>
      <div className="sbar"><input placeholder="Buscar cliente..." value={searchCli} onChange={e=>setSearchCli(e.target.value)} onKeyDown={e=>e.key==='Enter'&&searchClientes()}/><button className="btn btn-p" onClick={searchClientes}>Buscar</button></div>
      <table><thead><tr><th>Nombre</th><th>Teléfono</th><th>Membresía</th><th></th></tr></thead>
        <tbody>{clientes.map(c=><tr key={c.id}><td>{c.nombre}</td><td>{c.telefono||'-'}</td>
          <td>{c.membresia_nombre?<span className="pill pill-b">{c.membresia_nombre} ({c.descuento}%)</span>:'-'}</td>
          <td><button className="btn btn-p btn-sm" onClick={()=>{setCliente(c);setShowCli(false)}}>Seleccionar</button></td></tr>)}</tbody>
      </table>
      <button className="btn btn-o" style={{marginTop:10}} onClick={()=>setShowCli(false)}>Cerrar</button>
    </div></div>}

    {/* Ticket Modal */}
    {showTicket&&<div className="modal-ov"><div className="modal">
      <div className="ticket" id="ticket-print">
        <div className="ctr"><b>TORNILLOS Y HULES</b><br/>AUTOMOTRICES HERGON<br/>{showTicket.sucursal_nombre}<br/>{showTicket.sucursal_direccion}</div>
        <div className="ln"/>
        <div><b>Ticket:</b> {showTicket.ticket_numero}<br/><b>Fecha:</b> {new Date(showTicket.created_at).toLocaleString('es-MX')}<br/><b>Cajero:</b> {showTicket.cajero_nombre}
          {showTicket.cliente_nombre&&<><br/><b>Cliente:</b> {showTicket.cliente_nombre}</>}
        </div>
        <div className="ln"/>
        <table><thead><tr><td><b>Prod</b></td><td><b>Cant</b></td><td><b>P.U.</b></td><td style={{textAlign:'right'}}><b>Subt</b></td></tr></thead>
          <tbody>{showTicket.detalles.map((d,i)=><tr key={i}><td>{d.clave}</td><td>{d.cantidad}</td><td>${d.precio_unitario.toFixed(2)}</td><td style={{textAlign:'right'}}>${d.subtotal.toFixed(2)}</td></tr>)}</tbody>
        </table>
        <div className="ln"/>
        {showTicket.descuento_promocion>0&&<div>Desc. promoción: -${showTicket.descuento_promocion.toFixed(2)}</div>}
        {showTicket.descuento_membresia>0&&<div>Desc. membresía: -${showTicket.descuento_membresia.toFixed(2)}</div>}
        <div style={{fontSize:16,fontWeight:800}}>TOTAL: ${showTicket.total.toFixed(2)}</div>
        <div>Pago: {showTicket.tipo_pago.toUpperCase()}</div>
        {showTicket.offline&&<><div className="ln"/><div className="ctr" style={{color:'#991b1b',fontWeight:700}}>*** VENTA OFFLINE ***<br/>Pendiente de sincronizar</div></>}
        <div className="ln"/><div className="ctr">Gracias por su compra!</div>
      </div>
      <div style={{display:'flex',gap:8,marginTop:14,justifyContent:'center'}} className="no-print">
        <button className="btn btn-p" onClick={()=>window.print()}><i className="fas fa-print"/> Imprimir</button>
        <button className="btn btn-o" onClick={()=>setShowTicket(null)}>Cerrar</button>
      </div>
    </div></div>}
  </div>);
}

// === INVENTARIO ===
function Inventario({user}){
  const[inv,setInv]=useState([]);const[suc,setSuc]=useState('');const[bajo,setBajo]=useState(false);
  const[sucs,setSucs]=useState([]);const[showEntrada,setShowEntrada]=useState(false);const[showTraspaso,setShowTraspaso]=useState(false);
  const[entProd,setEntProd]=useState('');const[entCant,setEntCant]=useState('');const[entSuc,setEntSuc]=useState('');
  const[trProd,setTrProd]=useState('');const[trOrig,setTrOrig]=useState('');const[trDest,setTrDest]=useState('');const[trCant,setTrCant]=useState('');
  const[prods,setProds]=useState([]);
  const isAdmin=user.rol==='administrador';

  const load=()=>api(`/inventario?sucursal_id=${suc}&bajo_stock=${bajo?1:0}`).then(setInv);
  useEffect(()=>{load();api('/sucursales').then(setSucs)},[suc,bajo]);

  const doEntrada=async()=>{
    try{await api('/inventario/entrada',{method:'POST',body:JSON.stringify({producto_id:parseInt(entProd),sucursal_id:parseInt(entSuc||user.sucursal_id),cantidad:parseInt(entCant)})});
      setShowEntrada(false);load();alert('Entrada registrada');}catch(e){alert(e.message)}};
  const doTraspaso=async()=>{
    try{await api('/inventario/traspaso',{method:'POST',body:JSON.stringify({producto_id:parseInt(trProd),sucursal_origen_id:parseInt(trOrig),sucursal_destino_id:parseInt(trDest),cantidad:parseInt(trCant)})});
      setShowTraspaso(false);load();alert('Traspaso realizado');}catch(e){alert(e.message)}};
  const loadProds=()=>api('/productos').then(setProds);

  return(<div className="content">
    <div className="card">
      <div className="card-hdr"><span className="card-title"><i className="fas fa-boxes-stacked"/> Inventario</span>
        <div style={{display:'flex',gap:6}}>
          <button className="btn btn-ok" onClick={()=>{setShowEntrada(true);loadProds()}}><i className="fas fa-plus"/> Entrada</button>
          {isAdmin&&<button className="btn btn-p" onClick={()=>{setShowTraspaso(true);loadProds()}}><i className="fas fa-exchange-alt"/> Traspaso</button>}
        </div>
      </div>
      <div className="sbar">
        <select value={suc} onChange={e=>setSuc(e.target.value)} style={{width:200}}>
          <option value="">Todas las sucursales</option>
          {sucs.map(s=><option key={s.id} value={s.id}>{s.nombre}</option>)}
        </select>
        <label style={{display:'flex',alignItems:'center',gap:4,fontSize:13,whiteSpace:'nowrap'}}>
          <input type="checkbox" checked={bajo} onChange={e=>setBajo(e.target.checked)} style={{width:'auto'}}/> Solo stock bajo
        </label>
      </div>
      <div style={{overflowX:'auto'}}><table><thead><tr><th>Clave</th><th>Producto</th><th>Categoría</th><th>Sucursal</th><th>Stock</th><th>Mín</th><th>Estado</th></tr></thead>
        <tbody>{inv.map((r,i)=><tr key={i}>
          <td><b>{r.clave}</b></td><td>{r.producto_nombre}</td><td>{r.categoria_nombre}</td><td>{r.sucursal_nombre}</td>
          <td><b>{r.stock}</b></td><td>{r.stock_minimo}</td>
          <td>{r.stock===0?<span className="pill pill-r">Sin stock</span>:r.stock<=r.stock_minimo?<span className="pill pill-y">Bajo</span>:<span className="pill pill-g">OK</span>}</td>
        </tr>)}</tbody>
      </table></div>
    </div>

    {showEntrada&&<div className="modal-ov"><div className="modal">
      <h3>Registrar Entrada de Mercancía</h3>
      <div className="fg"><label>Producto</label><select value={entProd} onChange={e=>setEntProd(e.target.value)}><option value="">Seleccionar...</option>{prods.map(p=><option key={p.id} value={p.id}>{p.clave} - {p.nombre}</option>)}</select></div>
      <div className="fg"><label>Sucursal</label><select value={entSuc||user.sucursal_id} onChange={e=>setEntSuc(e.target.value)}>{sucs.map(s=><option key={s.id} value={s.id}>{s.nombre}</option>)}</select></div>
      <div className="fg"><label>Cantidad</label><input type="number" value={entCant} onChange={e=>setEntCant(e.target.value)} min="1"/></div>
      <div style={{display:'flex',gap:8}}><button className="btn btn-ok" onClick={doEntrada}>Registrar</button><button className="btn btn-o" onClick={()=>setShowEntrada(false)}>Cancelar</button></div>
    </div></div>}

    {showTraspaso&&<div className="modal-ov"><div className="modal">
      <h3>Traspaso entre Sucursales</h3>
      <div className="fg"><label>Producto</label><select value={trProd} onChange={e=>setTrProd(e.target.value)}><option value="">Seleccionar...</option>{prods.map(p=><option key={p.id} value={p.id}>{p.clave} - {p.nombre}</option>)}</select></div>
      <div className="g2">
        <div className="fg"><label>Sucursal Origen</label><select value={trOrig} onChange={e=>setTrOrig(e.target.value)}><option value="">Seleccionar...</option>{sucs.map(s=><option key={s.id} value={s.id}>{s.nombre}</option>)}</select></div>
        <div className="fg"><label>Sucursal Destino</label><select value={trDest} onChange={e=>setTrDest(e.target.value)}><option value="">Seleccionar...</option>{sucs.map(s=><option key={s.id} value={s.id}>{s.nombre}</option>)}</select></div>
      </div>
      <div className="fg"><label>Cantidad</label><input type="number" value={trCant} onChange={e=>setTrCant(e.target.value)} min="1"/></div>
      <div style={{display:'flex',gap:8}}><button className="btn btn-p" onClick={doTraspaso}>Traspasar</button><button className="btn btn-o" onClick={()=>setShowTraspaso(false)}>Cancelar</button></div>
    </div></div>}
  </div>);
}

// === CORTES DE CAJA ===
function Cortes({user}){
  const[resumen,setResumen]=useState(null);const[cortes,setCortes]=useState([]);const[monto,setMonto]=useState('');const[tab,setTab]=useState('hacer');
  const isAdmin=user.rol==='administrador';
  useEffect(()=>{if(tab==='hacer')api('/cortes/resumen').then(setResumen);else api(`/cortes?${isAdmin?'':'cajero_id='+user.id}`).then(setCortes)},[tab]);

  const hacerCorte=async()=>{
    if(!monto)return alert('Ingresa el monto en caja');
    try{const r=await api('/cortes',{method:'POST',body:JSON.stringify({monto_real:parseFloat(monto)})});
      alert(`Corte registrado. Diferencia: $${r.diferencia.toFixed(2)}`);setMonto('');setTab('historial');
    }catch(e){alert(e.message)}};

  return(<div className="content">
    <div className="tab-bar">
      <div className={`tab ${tab==='hacer'?'active':''}`} onClick={()=>setTab('hacer')}>Realizar Corte</div>
      <div className={`tab ${tab==='historial'?'active':''}`} onClick={()=>setTab('historial')}>Historial</div>
    </div>
    {tab==='hacer'&&resumen&&<div className="card">
      <h3 style={{marginBottom:14}}>Resumen del Turno Actual</h3>
      <div className="stats-grid">
        <div className="stat-card"><div className="sv">{resumen.num_ventas}</div><div className="sl">Ventas</div></div>
        <div className="stat-card"><div className="sv">${resumen.total_ventas.toFixed(2)}</div><div className="sl">Total vendido</div></div>
        <div className="stat-card"><div className="sv" style={{color:'var(--ok)'}}>${resumen.total_efectivo.toFixed(2)}</div><div className="sl">Efectivo</div></div>
        <div className="stat-card"><div className="sv" style={{color:'var(--p)'}}>${resumen.total_transferencia.toFixed(2)}</div><div className="sl">Transferencia</div></div>
        <div className="stat-card"><div className="sv" style={{color:'#8b5cf6'}}>${resumen.total_tarjeta.toFixed(2)}</div><div className="sl">Tarjeta</div></div>
        <div className="stat-card"><div className="sv" style={{color:'var(--err)'}}>${resumen.total_devoluciones.toFixed(2)}</div><div className="sl">Devoluciones</div></div>
      </div>
      <div style={{background:'#f0fdf4',padding:14,borderRadius:8,marginBottom:14}}>
        <b>Monto esperado en caja (efectivo - devoluciones): ${resumen.monto_esperado.toFixed(2)}</b>
      </div>
      <div className="fg"><label>Monto real en caja</label><input type="number" value={monto} onChange={e=>setMonto(e.target.value)} placeholder="0.00" step="0.01"/></div>
      {monto&&<div style={{padding:8,borderRadius:6,background:Math.abs(parseFloat(monto)-resumen.monto_esperado)>1?'#fef2f2':'#f0fdf4',marginBottom:10}}>
        Diferencia: <b>${(parseFloat(monto||0)-resumen.monto_esperado).toFixed(2)}</b>
      </div>}
      <button className="btn btn-ok btn-lg" onClick={hacerCorte}><i className="fas fa-check"/> Confirmar Corte</button>
    </div>}
    {tab==='historial'&&<div className="card">
      <table><thead><tr><th>Fecha</th><th>Cajero</th><th>Sucursal</th><th>Ventas</th><th>Total</th><th>Esperado</th><th>Real</th><th>Diferencia</th></tr></thead>
        <tbody>{cortes.map(c=><tr key={c.id}>
          <td>{new Date(c.created_at).toLocaleString('es-MX')}</td><td>{c.cajero_nombre}</td><td>{c.sucursal_nombre}</td>
          <td>{c.num_ventas}</td><td>${c.total_ventas.toFixed(2)}</td><td>${c.monto_esperado.toFixed(2)}</td><td>${c.monto_real.toFixed(2)}</td>
          <td style={{color:Math.abs(c.diferencia)>1?'var(--err)':'var(--ok)',fontWeight:700}}>${c.diferencia.toFixed(2)}</td>
        </tr>)}</tbody>
      </table>
    </div>}
  </div>);
}

// === CLIENTES ===

      </div>

// === PROMOCIONES ===
function Promociones(){
  const[promos,setPromos]=useState([]);const[show,setShow]=useState(false);const[cats,setCats]=useState([]);const[prods,setProds]=useState([]);
  const[f,setF]=useState({nombre:'',tipo:'porcentaje',valor:'',aplica_a:'todo',producto_id:'',categoria_id:'',fecha_inicio:'',fecha_fin:''});
  const load=()=>api('/promociones').then(setPromos);
  useEffect(()=>{load();api('/categorias').then(setCats);api('/productos').then(setProds)},[]);

  const save=async()=>{try{await api('/promociones',{method:'POST',body:JSON.stringify({...f,valor:parseFloat(f.valor)})});setShow(false);load()}catch(e){alert(e.message)}};
  const toggle=async id=>{await api(`/promociones/${id}/toggle`,{method:'PUT'});load()};
  const hoy=new Date().toISOString().split('T')[0];

  return(<div className="content">
    <div className="card">
      <div className="card-hdr"><span className="card-title"><i className="fas fa-tags"/> Promociones</span>
        <button className="btn btn-p" onClick={()=>{setF({nombre:'',tipo:'porcentaje',valor:'',aplica_a:'todo',producto_id:'',categoria_id:'',fecha_inicio:hoy,fecha_fin:''});setShow(true)}}><i className="fas fa-plus"/> Nueva</button></div>
      <table><thead><tr><th>Nombre</th><th>Tipo</th><th>Valor</th><th>Aplica a</th><th>Inicio</th><th>Fin</th><th>Estado</th><th></th></tr></thead>
        <tbody>{promos.map(p=>{
          const activa=p.activo&&p.fecha_inicio<=hoy&&p.fecha_fin>=hoy;
          return <tr key={p.id}><td><b>{p.nombre}</b></td><td>{p.tipo==='porcentaje'?'%':'$'}</td><td>{p.valor}{p.tipo==='porcentaje'?'%':''}</td>
            <td>{p.aplica_a==='todo'?'Toda la tienda':p.aplica_a==='categoria'?p.categoria_nombre:p.producto_nombre}</td>
            <td>{p.fecha_inicio}</td><td>{p.fecha_fin}</td>
            <td>{activa?<span className="pill pill-g">Activa</span>:p.activo?<span className="pill pill-y">Programada</span>:<span className="pill pill-r">Inactiva</span>}</td>
            <td><button className="btn btn-o btn-sm" onClick={()=>toggle(p.id)}>{p.activo?'Desactivar':'Activar'}</button></td></tr>})}</tbody>
      </table>
    </div>

    {show&&<div className="modal-ov"><div className="modal">
      <h3>Nueva Promoción</h3>
      <div className="fg"><label>Nombre</label><input value={f.nombre} onChange={e=>setF({...f,nombre:e.target.value})}/></div>
      <div className="g2">
        <div className="fg"><label>Tipo descuento</label><select value={f.tipo} onChange={e=>setF({...f,tipo:e.target.value})}><option value="porcentaje">Porcentaje (%)</option><option value="monto_fijo">Monto fijo ($)</option></select></div>
        <div className="fg"><label>Valor</label><input type="number" value={f.valor} onChange={e=>setF({...f,valor:e.target.value})}/></div>
      </div>
      <div className="fg"><label>Aplica a</label><select value={f.aplica_a} onChange={e=>setF({...f,aplica_a:e.target.value})}><option value="todo">Toda la tienda</option><option value="categoria">Categoría</option><option value="producto">Producto</option></select></div>
      {f.aplica_a==='categoria'&&<div className="fg"><label>Categoría</label><select value={f.categoria_id} onChange={e=>setF({...f,categoria_id:e.target.value})}><option value="">Seleccionar...</option>{cats.map(c=><option key={c.id} value={c.id}>{c.nombre}</option>)}</select></div>}
      {f.aplica_a==='producto'&&<div className="fg"><label>Producto</label><select value={f.producto_id} onChange={e=>setF({...f,producto_id:e.target.value})}><option value="">Seleccionar...</option>{prods.map(p=><option key={p.id} value={p.id}>{p.clave} - {p.nombre}</option>)}</select></div>}
      <div className="g2">
        <div className="fg"><label>Fecha inicio</label><input type="date" value={f.fecha_inicio} onChange={e=>setF({...f,fecha_inicio:e.target.value})}/></div>
        <div className="fg"><label>Fecha fin</label><input type="date" value={f.fecha_fin} onChange={e=>setF({...f,fecha_fin:e.target.value})}/></div>
      </div>
      <div style={{display:'flex',gap:8}}><button className="btn btn-ok" onClick={save}>Crear</button><button className="btn btn-o" onClick={()=>setShow(false)}>Cancelar</button></div>
    </div></div>}
  </div>);
}

// === REPORTES ===
function Reportes(){
  const[tab,setTab]=useState('ventas');const[sucs,setSucs]=useState([]);const[users,setUsers]=useState([]);
  const[filtros,setFiltros]=useState({sucursal_id:'',cajero_id:'',fecha_desde:'',fecha_hasta:'',tipo_pago:'',agrupar:''});
  const[data,setData]=useState(null);const[top,setTop]=useState([]);const[ventas,setVentas]=useState([]);
  const[selectedVenta,setSelectedVenta]=useState(null);

  useEffect(()=>{api('/sucursales').then(setSucs);api('/usuarios').then(setUsers).catch(()=>{})},[]);

  const buscar=async()=>{
    const qs=Object.entries(filtros).filter(([k,v])=>v).map(([k,v])=>`${k}=${v}`).join('&');
    if(tab==='ventas'){const d=await api(`/reportes/ventas?${qs}`);setData(d)}
    else if(tab==='top'){const d=await api(`/reportes/productos-top?${qs}`);setTop(d)}
    else if(tab==='tickets'){const d=await api(`/ventas?${qs}`);setVentas(d)}
  };
  const verTicket=async id=>{const v=await api(`/ventas/${id}`);setSelectedVenta(v)};

  return(<div className="content">
    <div className="tab-bar">
      <div className={`tab ${tab==='ventas'?'active':''}`} onClick={()=>setTab('ventas')}>Ventas</div>
      <div className={`tab ${tab==='top'?'active':''}`} onClick={()=>setTab('top')}>Más vendidos</div>
      <div className={`tab ${tab==='tickets'?'active':''}`} onClick={()=>setTab('tickets')}>Tickets</div>
    </div>
    <div className="card">
      <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:14}}>
        <select value={filtros.sucursal_id} onChange={e=>setFiltros({...filtros,sucursal_id:e.target.value})} style={{width:180}}><option value="">Todas sucursales</option>{sucs.map(s=><option key={s.id} value={s.id}>{s.nombre}</option>)}</select>
        {tab==='ventas'&&<select value={filtros.agrupar} onChange={e=>setFiltros({...filtros,agrupar:e.target.value})} style={{width:150}}><option value="">Sin agrupar</option><option value="sucursal">Por sucursal</option><option value="cajero">Por cajero</option><option value="dia">Por día</option></select>}
        <input type="date" value={filtros.fecha_desde} onChange={e=>setFiltros({...filtros,fecha_desde:e.target.value})} style={{width:150}}/>
        <input type="date" value={filtros.fecha_hasta} onChange={e=>setFiltros({...filtros,fecha_hasta:e.target.value})} style={{width:150}}/>
        <select value={filtros.tipo_pago} onChange={e=>setFiltros({...filtros,tipo_pago:e.target.value})} style={{width:140}}><option value="">Todo pago</option><option value="efectivo">Efectivo</option><option value="transferencia">Transferencia</option><option value="tarjeta">Tarjeta</option></select>
        <button className="btn btn-p" onClick={buscar}><i className="fas fa-search"/> Buscar</button>
      </div>

      {tab==='ventas'&&data&&<div>
        <div className="stats-grid">
          <div className="stat-card"><div className="sv">{data.resumen.total_ventas}</div><div className="sl">Total ventas</div></div>
          <div className="stat-card"><div className="sv">${Number(data.resumen.monto_total).toFixed(2)}</div><div className="sl">Monto total</div></div>
          <div className="stat-card"><div className="sv" style={{color:'var(--ok)'}}>${Number(data.resumen.total_efectivo).toFixed(2)}</div><div className="sl">Efectivo</div></div>
          <div className="stat-card"><div className="sv" style={{color:'var(--p)'}}>${Number(data.resumen.total_transferencia).toFixed(2)}</div><div className="sl">Transferencia</div></div>
          <div className="stat-card"><div className="sv" style={{color:'#8b5cf6'}}>${Number(data.resumen.total_tarjeta).toFixed(2)}</div><div className="sl">Tarjeta</div></div>
        </div>
        {data.detalle&&data.detalle.length>0&&<table><thead><tr>{filtros.agrupar?<><th>Grupo</th><th>Ventas</th><th>Monto</th></>:<><th>Ticket</th><th>Total</th><th>Pago</th><th>Sucursal</th><th>Cajero</th><th>Fecha</th></>}</tr></thead>
          <tbody>{data.detalle.map((r,i)=><tr key={i}>{filtros.agrupar?<><td>{r.grupo}</td><td>{r.ventas}</td><td>${Number(r.monto).toFixed(2)}</td></>:
            <><td>{r.ticket_numero}</td><td>${r.total.toFixed(2)}</td><td><span className="pill pill-gr">{r.tipo_pago}</span></td><td>{r.sucursal}</td><td>{r.cajero}</td><td>{new Date(r.created_at).toLocaleString('es-MX')}</td></>}</tr>)}</tbody>
        </table>}
      </div>}

      {tab==='top'&&top.length>0&&<table><thead><tr><th>#</th><th>Clave</th><th>Producto</th><th>Vendidos</th><th>Monto</th></tr></thead>
        <tbody>{top.map((p,i)=><tr key={i}><td><b>{i+1}</b></td><td>{p.clave}</td><td>{p.nombre}</td><td><b>{p.total_vendido}</b></td><td>${Number(p.total_monto).toFixed(2)}</td></tr>)}</tbody>
      </table>}

      {tab==='tickets'&&<div>
        <table><thead><tr><th>Ticket</th><th>Fecha</th><th>Sucursal</th><th>Cajero</th><th>Cliente</th><th>Total</th><th>Pago</th><th></th></tr></thead>

            <td>{v.sucursal_nombre}</td><td>{v.cajero_nombre}</td><td>{v.cliente_nombre||'-'}</td>
            <td><b>${v.total.toFixed(2)}</b></td><td><span className="pill pill-gr">{v.tipo_pago}</span></td>
            <td><button className="btn btn-p btn-sm" onClick={()=>verTicket(v.id)}><i className="fas fa-eye"/> Ver</button></td></tr>)}</tbody>
        </table>
      </div>}

      {!data&&tab==='ventas'&&<div className="empty"><i className="fas fa-chart-bar"/><p>Selecciona filtros y presiona Buscar</p></div>}
    </div>

    {selectedVenta&&<div className="modal-ov"><div className="modal">
      <div className="ticket">
        <div className="ctr"><b>TORNILLOS Y HULES</b><br/>AUTOMOTRICES HERGON<br/>{selectedVenta.sucursal_nombre}<br/>{selectedVenta.sucursal_direccion}</div>
        <div className="ln"/><div><b>Ticket:</b> {selectedVenta.ticket_numero}<br/><b>Fecha:</b> {new Date(selectedVenta.created_at).toLocaleString('es-MX')}<br/><b>Cajero:</b> {selectedVenta.cajero_nombre}
          {selectedVenta.cliente_nombre&&<><br/><b>Cliente:</b> {selectedVenta.cliente_nombre}</>}</div>
        <div className="ln"/>
        <table><thead><tr><td><b>Prod</b></td><td><b>Cant</b></td><td><b>P.U.</b></td><td style={{textAlign:'right'}}><b>Subt</b></td></tr></thead>
          <tbody>{selectedVenta.detalles.map((d,i)=><tr key={i}><td>{d.clave}</td><td>{d.cantidad}</td><td>${d.precio_unitario.toFixed(2)}</td><td style={{textAlign:'right'}}>${d.subtotal.toFixed(2)}</td></tr>)}</tbody>
        </table>
        <div className="ln"/>
        <div style={{fontSize:16,fontWeight:800}}>TOTAL: ${selectedVenta.total.toFixed(2)}</div>
        <div>Pago: {selectedVenta.tipo_pago.toUpperCase()}</div>
        <div className="ln"/><div className="ctr">¡Gracias por su compra!</div>
      </div>
      <div style={{display:'flex',gap:8,marginTop:14,justifyContent:'center'}}>
        <button className="btn btn-p" onClick={()=>window.print()}><i className="fas fa-print"/> Reimprimir</button>
        <button className="btn btn-o" onClick={()=>setSelectedVenta(null)}>Cerrar</button>
      </div>
    </div></div>}
  </div>);
}

// === NOTIFICACIONES PANEL ===
function NotifPanel({open,onClose}){
  const[notifs,setNotifs]=useState([]);
  useEffect(()=>{if(open)api('/notificaciones').then(setNotifs)},[open]);
  const marcarLeida=async id=>{await api(`/notificaciones/${id}/leer`,{method:'POST'});setNotifs(n=>n.map(x=>x.id===id?{...x,leida:1}:x))};

  return(<div className={`npanel ${open?'open':''}`}>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
      <h3><i className="fas fa-bell"/> Notificaciones</h3>
      <button className="btn btn-o btn-sm" onClick={onClose}><i className="fas fa-times"/></button>
    </div>
    {notifs.map(n=><div key={n.id} className={`nitem t-${n.tipo} ${!n.leida?'unread':''}`} onClick={()=>marcarLeida(n.id)}>
      <div style={{fontWeight:600,marginBottom:2}}>{n.mensaje}</div>
      <div style={{color:'var(--txtl)',fontSize:11}}>{n.sucursal_nombre&&`${n.sucursal_nombre} · `}{new Date(n.created_at).toLocaleString('es-MX')}</div>
    </div>)}
    {notifs.length===0&&<div className="empty"><i className="fas fa-bell-slash"/><p>Sin notificaciones</p></div>}
  </div>);
}

// === CONNECTION STATUS ===
function ConnStatus(){
  const[online,setOnline]=useState(navigator.onLine);
  const[syncing,setSyncing]=useState(false);
  const[queueCount,setQueueCount]=useState(0);
  useEffect(()=>{
    const goOnline=async()=>{setOnline(true);
      const q=await HergonOffline.getQueueCount();
      if(q>0){setSyncing(true);const r=await HergonOffline.syncQueue();setSyncing(false);
        if(r.ok&&r.count>0)alert(`Se sincronizaron ${r.count} ventas offline exitosamente.`);
        if(r.errors>0)alert(`${r.errors} ventas no pudieron sincronizarse. Revisa el inventario.`);
      }
      setQueueCount(0);HergonOffline.refreshCache();
    };
    const goOffline=()=>{setOnline(false)};
    const checkQueue=async()=>{const c=await HergonOffline.getQueueCount();setQueueCount(c)};
    window.addEventListener('online',goOnline);window.addEventListener('offline',goOffline);
    const iv=setInterval(checkQueue,5000);checkQueue();
    return()=>{window.removeEventListener('online',goOnline);window.removeEventListener('offline',goOffline);clearInterval(iv)};
  },[]);
  return(<>
    <div className={`conn-status ${syncing?'conn-syncing':online?'conn-online':'conn-offline'}`}>
      <span className={`conn-dot ${syncing?'sync':online?'on':'off'}`}/>
      {syncing?'Sincronizando...':online?'En linea':'Sin conexion'}
      {queueCount>0&&!syncing&&<span style={{marginLeft:4}}>({queueCount} pendiente{queueCount>1?'s':''})</span>}
    </div>
    {!online&&<div className="offline-badge"><i className="fas fa-wifi" style={{opacity:.6}}/> Modo Offline — Las ventas se guardan localmente</div>}
    {queueCount>0&&online&&!syncing&&<div className="offline-badge offline-queue-badge"><i className="fas fa-sync"/> {queueCount} venta{queueCount>1?'s':''} pendiente{queueCount>1?'s':''} de sincronizar</div>}
  </>);
}

// === AI ASSISTANT ===
function AIAssistant({user,onAddToCart}){
  const[open,setOpen]=useState(false);
  const[msgs,setMsgs]=useState([{type:'bot',text:'Hola, soy el asistente HERGON. Puedo ayudarte a buscar productos, revisar precios y disponibilidad. Escribe lo que necesitas.'}]);
  const[input,setInput]=useState('');const[loading,setLoading]=useState(false);
  const msgsEnd=useRef(null);
  useEffect(()=>{msgsEnd.current?.scrollIntoView({behavior:'smooth'})},[msgs]);

  const send=async()=>{
    if(!input.trim()||loading)return;
    const q=input.trim();setInput('');
    setMsgs(m=>[...m,{type:'user',text:q}]);setLoading(true);
    try{
      let data;
      if(navigator.onLine){
        data=await api(`/asistente?consulta=${encodeURIComponent(q)}&sucursal_id=${user.sucursal_id}`);
      }else{
        // Offline: search cached products
        const cached=await HergonOffline.getCachedData('productos_cache');
        const ql=q.toLowerCase();
        const found=cached.filter(p=>p.nombre.toLowerCase().includes(ql)||p.clave.toLowerCase().includes(ql)||(p.descripcion||'').toLowerCase().includes(ql)).slice(0,15);
        data={respuesta:found.length>0?`Encontre ${found.length} producto(s) en cache offline para "${q}".`:`No encontre "${q}" en el cache local. Intenta cuando vuelva la conexion.`,productos:found};
      }
      setMsgs(m=>[...m,{type:'bot',text:data.respuesta,productos:data.productos||[]}]);
    }catch(e){
      setMsgs(m=>[...m,{type:'bot',text:'Error al buscar: '+e.message}]);
    }
    setLoading(false);
  };

  return(<>
    <button className="ai-fab no-print" onClick={()=>setOpen(!open)} title="Asistente HERGON">
      <i className={`fas ${open?'fa-times':'fa-robot'}`}/>
    </button>
    <div className={`ai-panel ${open?'open':''} no-print`}>
      <div className="ai-hdr">
        <h3><i className="fas fa-robot"/> Asistente HERGON</h3>
        <button style={{background:'none',border:'none',color:'#fff',cursor:'pointer',fontSize:16}} onClick={()=>setOpen(false)}><i className="fas fa-chevron-down"/></button>
      </div>
      <div className="ai-msgs">
        {msgs.map((m,i)=><div key={i} className={`ai-msg ${m.type}`}>
          <div>{m.text}</div>
          {m.productos&&m.productos.length>0&&<div className="ai-prods">
            {m.productos.slice(0,8).map(p=><div key={p.id} className="ai-prod" onClick={()=>{if(onAddToCart&&(p.stock_local>0||p.stock_total>0))onAddToCart(p)}}>
              <b>{p.clave}</b> — {p.nombre}<br/>
              <span style={{color:'#059669'}}>${p.precio_menudeo?.toFixed(2)||'N/A'}</span>
              {p.stock_local!==undefined?<span style={{marginLeft:8,color:p.stock_local>0?'#6b7280':'#dc2626'}}>Stock: {p.stock_local}</span>
              :<span style={{marginLeft:8,color:'#6b7280'}}>Total: {p.stock_total}</span>}
            </div>)}
            {m.productos.length>8&&<div style={{fontSize:11,color:'#6b7280',textAlign:'center'}}>...y {m.productos.length-8} mas</div>}
          </div>}
        </div>)}
        {loading&&<div className="ai-msg bot"><i className="fas fa-spinner fa-spin"/> Buscando...</div>}
        <div ref={msgsEnd}/>
      </div>
      <div className="ai-input">
        <input placeholder="Busca tornillos, hules, mangueras..." value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&send()}/>
        <button className="btn btn-p" onClick={send} disabled={loading}><i className="fas fa-paper-plane"/></button>
      </div>
    </div>
  </>);
}

// === APP PRINCIPAL ===
function App(){
  const[user,setUser]=useState(()=>{try{return JSON.parse(localStorage.getItem('user'))}catch(e){return null}});
  const[page,setPage]=useState('dashboard');const[notifOpen,setNotifOpen]=useState(false);const[unread,setUnread]=useState(0);

  useEffect(()=>{
    if(!user)return;
    const loadUnread=()=>api('/notificaciones/no-leidas').then(d=>setUnread(d.count)).catch(()=>{});
    loadUnread();const iv=setInterval(loadUnread,15000);
    socket.on('notificacion',()=>loadUnread());
    // Cache data for offline use periodically
    HergonOffline.refreshCache(user.sucursal_id);
    const cacheIv=setInterval(()=>HergonOffline.refreshCache(user.sucursal_id),300000); // every 5 min
    return()=>{clearInterval(iv);clearInterval(cacheIv);socket.off('notificacion')};
  },[user]);

  const logout=()=>{localStorage.removeItem('token');localStorage.removeItem('user');setUser(null)};
  if(!user)return <Login onLogin={setUser}/>;

  const titles={dashboard:'Dashboard',pos:'Punto de Venta',inventario:'Inventario',cortes:'Cortes de Caja',clientes:'Clientes',promociones:'Promociones',usuarios:'Usuarios',reportes:'Reportes'};

  return(<div>
    <Sidebar page={page} setPage={setPage} user={user} onLogout={logout}/>
    <div className="main">
      <div className="topbar no-print">
        <h1>{titles[page]||'HERGON POS'}</h1>
        <div className="topbar-act">
          <ConnStatus/>
          <span style={{fontSize:12,color:'var(--txtl)'}}>{user.sucursal_nombre}</span>
          <button className="nbtn" onClick={()=>{setNotifOpen(!notifOpen);if(!notifOpen)setUnread(0)}}>
            <i className="fas fa-bell"/>{unread>0&&<span className="badge">{unread>99?'99+':unread}</span>}
          </button>
        </div>
      </div>
      {page==='dashboard'&&<Dashboard/>}
      {page==='pos'&&<POS user={user}/>}
      {page==='inventario'&&<Inventario user={user}/>}
      {page==='cortes'&&<Cortes user={user}/>}
      {page==='clientes'&&<Clientes user={user}/>}
      {page==='promociones'&&<Promociones/>}
      {page==='usuarios'&&<Usuarios/>}
      {page==='reportes'&&<Reportes/>}
    </div>
    <NotifPanel open={notifOpen} onClose={()=>setNotifOpen(false)}/>
    <AIAssistant user={user} onAddToCart={page==='pos'?null:null}/>
  </div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
